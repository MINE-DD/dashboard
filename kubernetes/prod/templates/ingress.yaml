apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: Plan-EO-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.org/websocket-services: "Plan-EO"
    nginx.org/proxy-connect-timeout: "600s"
    nginx.org/proxy-read-timeout: "600s"
    nginx.org/proxy-send-timeout: "600s"
spec:
  rules:
    - host: Plan-EO.pods.uvarc.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: Plan-EO
                port:
                  number: 80



  tls:
    - hosts:
        - Plan-EO.pods.uvarc.io
      secretName: Plan-EO-nginx-tls-ingress-secret

