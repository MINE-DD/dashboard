name: Docker Build & Push

on:
  push:
    branches:
      - main      # Trigger on push to main branch
    tags:
      - '*'       # Trigger on any tag push

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1️⃣ Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Set lowercase repository owner to avoid Docker errors
      - name: Set lowercase repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      # 3️⃣ Set up QEMU for cross-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 4️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5️⃣ Login to GitHub Container Registry
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6️⃣ Extract tag version from Git tags (optional)
      - name: Get Tag Version
        run: |
          IMAGE_TAG=${GITHUB_REF#refs/tags/}
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      # 7️⃣ Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/dashboard:latest
            ghcr.io/${{ env.OWNER_LC }}/dashboard:${{ github.sha }}
            ${{ github.ref_type == 'tag' && IMAGE_TAG != '' && 'ghcr.io/' + env.OWNER_LC + '/dashboard:' + IMAGE_TAG || '' }}

      # 8️⃣ (Optional) Update Kubernetes values.yaml with new image tag
      - name: Update Kubernetes values.yaml
        if: github.ref_type == 'tag'
        run: |
          yq eval ".image.tag = \"${IMAGE_TAG}\"" -i kubernetes/prod/values.yaml
          git config user.name "GitHub Actions Bot"
          git config user.email "github@virginia.edu"
          git add kubernetes/prod/values.yaml
          git commit -m "[skip ci] Update image tag to ${IMAGE_TAG}" || echo "No changes"
          git push origin main || echo "Push failed, likely no changes"