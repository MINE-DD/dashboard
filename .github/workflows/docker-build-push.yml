name: Docker Build & Push

on:
  push:
    branches:
      - main      # Trigger on main branch push
    tags:
      - '*'       # Trigger on any tag push

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform images)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mine-dd:latest
            ghcr.io/${{ github.repository_owner }}/mine-dd:${{ github.sha }}

      - name: (Optional) Update Kubernetes values
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}   # Short SHA
          yq eval ".image.tag = \"${IMAGE_TAG}\"" -i kubernetes/prod/values.yaml
          git config user.name "GitHub Actions Bot"
          git config user.email "github@virginia.edu"
          git add kubernetes/prod/values.yaml
          git commit -m "[skip ci] Update image tag to ${IMAGE_TAG}" || echo "No changes"
          git push origin main || echo "Push failed, likely no changes"